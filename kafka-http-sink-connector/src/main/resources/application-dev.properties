# Disable TLS validation
quarkus.tls.trust-all=true

# OpenTelemetry
quarkus.otel.enabled=false

# Dev Services
quarkus.devservices.timeout=240

# Kubernetes
quarkus.kubernetes-config.enabled=false
quarkus.kubernetes-client.devservices.enabled=false

# Keycloak
quarkus.keycloak.devservices.enabled=true
quarkus.keycloak.devservices.port=8180
quarkus.keycloak.devservices.realm-name=test
quarkus.keycloak.devservices.users.test=test

# Kafka
quarkus.kafka.devservices.enabled=true
quarkus.kafka.devservices.provider=strimzi
quarkus.kafka.devservices.image-name=quay.io/strimzi-test-container/test-container:latest-kafka-4.1.0
quarkus.kafka.devservices.port=9092
quarkus.kafka.devservices.topic-partitions.test=1
quarkus.kafka.devservices.topic-partitions.dlq=1

# Apache Camel Kafka Component
camel.component.kafka.brokers=localhost:9092
camel.component.kafka.securityProtocol=PLAINTEXT
camel.component.kafka.shutdownTimeout=5000

# HTTP
quarkus.wiremock.devservices.enabled=false
quarkus.wiremock.devservices.port=8280
quarkus.wiremock.devservices.reload=true

# Application
kafka.topic.incoming=test
kafka.topic.dlq=dlq

http.url=http://localhost:8280/test
http.method=POST
http.secure=false
http.content-type=application/json
http.auth=basic
http.auth.basic.username=test
http.auth.basic.password=test